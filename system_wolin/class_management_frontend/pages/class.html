<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理</title>
    <link rel="stylesheet" href="/class_frontend/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='/class_frontend/'">← 返回</button>
                <h1>📚 班级管理</h1>
            </div>
            <button class="btn btn-primary" onclick="showAddClassModal()">添加班级</button>
        </header>

        <!-- 操作按钮 -->
        <div class="button-group">
            <button class="btn btn-secondary" onclick="loadClasses()">刷新列表</button>
        </div>

        <!-- 班级列表表格 -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>班级ID</th>
                        <th>开班日期</th>
                        <th>班主任</th>
                        <th>任课教师</th>
                        <th>学生数量</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="classTableBody">
                    <!-- 动态加载班级数据 -->
                </tbody>
            </table>
        </div>

        <!-- 添加/编辑班级模态框 -->
        <div id="classModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">添加班级</h2>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <div class="modal-body">
                    <form id="classForm">
                        <div class="form-group">
                            <label for="classId">班级ID：</label>
                            <input type="number" id="classId" name="id" required>
                        </div>
                        <div class="form-group">
                            <label for="startDate">开班日期：</label>
                            <input type="date" id="startDate" name="start_date" required>
                        </div>
                        <div class="form-group">
                            <label for="headTeacher">班主任：</label>
                            <input type="text" id="headTeacher" name="head_teacher" required>
                        </div>
                        <div class="form-group">
                            <label for="teachingTeacher">任课教师：</label>
                            <input type="text" id="teachingTeacher" name="teaching_teacher" required>
                        </div>
                        <div class="button-group">
                            <button type="submit" class="btn btn-primary">保存</button>
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- 消息提示 -->
        <div id="messageToast" class="toast"></div>
    </div>

    <script src="/class_frontend/static/js/class.js"></script>
</body>
</html>
