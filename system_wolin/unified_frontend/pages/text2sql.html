<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能查询 - 教务管理系统</title>
    <link rel="stylesheet" href="/unified_frontend/static/css/style.css">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .query-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .query-form {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 300px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .sql-preview {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-bottom: 15px;
            position: relative;
        }

        .sql-preview::before {
            content: '生成的 SQL';
            position: absolute;
            top: -10px;
            left: 10px;
            background: #2d2d2d;
            padding: 0 10px;
            color: #667eea;
            font-size: 12px;
        }

        .chat-history {
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 15px;
        }

        .chat-message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 8px;
            max-width: 80%;
        }

        .chat-message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .chat-message.assistant {
            background: #f0f0f0;
            color: #333;
        }

        .chat-message .time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .result-table th,
        .result-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-table th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .result-table tbody tr:hover {
            background: #f8f9fa;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #c62828;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .session-info {
            background: #e3f2fd;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #1565c0;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 10px;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <header class="page-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='/unified_frontend/'">← 返回</button>
                <h1>🤖 AI 智能查询</h1>
            </div>
        </header>

        <div class="chat-container">
            <!-- 会话信息 -->
            <div class="session-info">
                <span>💡 您可以使用自然语言查询数据库，AI 会自动生成 SQL 并返回结果。支持连续对话！</span>
            </div>

            <!-- 查询区域 -->
            <div class="query-section">
                <h3>💬 智能问答</h3>
                <div class="query-form">
                    <div class="input-group">
                        <input type="text" id="questionInput" placeholder="例如：查询所有学生的姓名和班级" onkeypress="if(event.key==='Enter')sendQuery()">
                        <button class="btn btn-primary" onclick="sendQuery()">查询</button>
                        <button class="btn btn-secondary" onclick="clearHistory()">清空历史</button>
                    </div>
                </div>

                <!-- SQL 预览 -->
                <div id="sqlPreview" class="sql-preview" style="display: none;">
                    <span id="sqlContent"></span>
                    <button class="copy-btn" onclick="copySQL()">复制SQL</button>
                </div>

                <!-- 查询结果 -->
                <div id="queryResult"></div>
            </div>

            <!-- 对话历史 -->
            <div class="query-section">
                <h3>📜 对话历史</h3>
                <div id="chatHistory" class="chat-history">
                    <div class="empty-state">
                        <div class="icon">💬</div>
                        <p>暂无对话记录</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 消息提示 -->
        <div id="messageToast" class="toast"></div>
    </div>

    <script>
        // 会话ID（使用UUID生成）
        let sessionId = generateSessionId();

        // 生成会话ID
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // 发送查询
        async function sendQuery() {
            const questionInput = document.getElementById('questionInput');
            const question = questionInput.value.trim();

            if (!question) {
                showToast('请输入查询问题', 'error');
                return;
            }

            // 显示加载状态
            showLoading();
            hideSQLPreview();
            
            try {
                // 调用 API
                const response = await fetch('/ai/text2sql', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: question,
                        session_id: sessionId
                    })
                });

                const result = await response.json();

                if (result.code === 200) {
                    // 成功
                    displayResult(result.data);
                    addToHistory(question, result.data);
                } else {
                    // 失败
                    displayError(result.message);
                    addToHistory(question, null, result.message);
                }

            } catch (error) {
                console.error('查询失败:', error);
                displayError('网络错误，请稍后重试');
                addToHistory(question, null, '网络错误');
            }

            // 清空输入框
            questionInput.value = '';
        }

        // 显示加载状态
        function showLoading() {
            const queryResult = document.getElementById('queryResult');
            queryResult.innerHTML = '<div class="loading">AI 正在思考中</div>';
        }

        // 显示 SQL 预览
        function showSQLPreview(sql) {
            const sqlPreview = document.getElementById('sqlPreview');
            const sqlContent = document.getElementById('sqlContent');
            sqlPreview.style.display = 'block';
            sqlContent.textContent = sql;
        }

        // 隐藏 SQL 预览
        function hideSQLPreview() {
            document.getElementById('sqlPreview').style.display = 'none';
        }

        // 复制 SQL
        function copySQL() {
            const sql = document.getElementById('sqlContent').textContent;
            navigator.clipboard.writeText(sql).then(() => {
                showToast('SQL 已复制到剪贴板', 'success');
            }).catch(() => {
                showToast('复制失败', 'error');
            });
        }

        // 显示查询结果
        function displayResult(data) {
            const queryResult = document.getElementById('queryResult');
            
            if (!data.sql) {
                queryResult.innerHTML = '<div class="error-message">未能生成 SQL 语句</div>';
                return;
            }

            // 显示 SQL
            showSQLPreview(data.sql);

            if (!data.result) {
                queryResult.innerHTML = '<div class="error-message">SQL 执行失败</div>';
                return;
            }

            // 构建结果表格
            let html = '';
            
            if (data.result.data && data.result.data.length > 0) {
                const columns = data.result.columns || Object.keys(data.result.data[0]);
                
                html = '<table class="result-table">';
                html += '<thead><tr>';
                columns.forEach(col => {
                    html += `<th>${col}</th>`;
                });
                html += '</tr></thead>';
                html += '<tbody>';
                
                data.result.data.forEach(row => {
                    html += '<tr>';
                    columns.forEach(col => {
                        html += `<td>${row[col] !== null ? row[col] : ''}</td>`;
                    });
                    html += '</tr>';
                });
                
                html += '</tbody></table>';
                html += `<p style="margin-top:10px;color:#666;font-size:13px;">共 ${data.result.data.length} 条记录</p>`;
            } else {
                html = '<div class="empty-state"><div class="icon">📭</div><p>查询结果为空</p></div>';
            }

            queryResult.innerHTML = html;
        }

        // 显示错误信息
        function displayError(message) {
            const queryResult = document.getElementById('queryResult');
            queryResult.innerHTML = `<div class="error-message">${message}</div>`;
        }

        // 添加到对话历史
        function addToHistory(question, data, error = null) {
            const chatHistory = document.getElementById('chatHistory');
            
            // 移除空状态
            const emptyState = chatHistory.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            // 用户消息
            const userMessage = document.createElement('div');
            userMessage.className = 'chat-message user';
            userMessage.innerHTML = `
                <div>${escapeHtml(question)}</div>
                <div class="time">${time}</div>
            `;
            chatHistory.appendChild(userMessage);

            // AI 回复
            const assistantMessage = document.createElement('div');
            assistantMessage.className = 'chat-message assistant';
            
            if (error) {
                assistantMessage.innerHTML = `
                    <div style="color:#c62828;">❌ ${error}</div>
                    <div class="time">${time}</div>
                `;
            } else {
                assistantMessage.innerHTML = `
                    <div>✅ 查询成功，返回 ${data.result?.data?.length || 0} 条记录</div>
                    <div class="time">${time}</div>
                `;
            }
            
            chatHistory.appendChild(assistantMessage);

            // 滚动到底部
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // 清空历史
        async function clearHistory() {
            if (!confirm('确定要清空对话历史吗？')) {
                return;
            }

            try {
                const response = await fetch('/ai/history/clear', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                if (response.ok) {
                    // 清空本地历史显示
                    const chatHistory = document.getElementById('chatHistory');
                    chatHistory.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">💬</div>
                            <p>暂无对话记录</p>
                        </div>
                    `;
                    
                    // 隐藏 SQL 预览和结果
                    hideSQLPreview();
                    document.getElementById('queryResult').innerHTML = '';
                    
                    // 生成新的会话ID
                    sessionId = generateSessionId();
                    
                    showToast('对话历史已清空', 'success');
                } else {
                    showToast('清空失败', 'error');
                }
            } catch (error) {
                console.error('清空历史失败:', error);
                showToast('网络错误', 'error');
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示提示消息
        function showToast(message, type = 'info') {
            const toast = document.getElementById('messageToast');
            toast.textContent = message;
            toast.className = 'toast show';
            
            if (type === 'error') {
                toast.style.background = '#c62828';
            } else if (type === 'success') {
                toast.style.background = '#2e7d32';
            } else {
                toast.style.background = '#333';
            }

            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        // 页面加载时初始化
        window.onload = function() {
            // 可以在这里加载历史记录
            loadHistory();
        };

        // 加载历史记录
        async function loadHistory() {
            try {
                const response = await fetch(`/ai/history/${sessionId}`);
                const result = await response.json();

                if (result.code === 200 && result.data.messages.length > 0) {
                    const chatHistory = document.getElementById('chatHistory');
                    const emptyState = chatHistory.querySelector('.empty-state');
                    if (emptyState) {
                        emptyState.remove();
                    }

                    result.data.messages.forEach(msg => {
                        const messageDiv = document.createElement('div');
                        messageDiv.className = `chat-message ${msg.role}`;
                        messageDiv.innerHTML = `
                            <div>${escapeHtml(msg.content)}</div>
                        `;
                        chatHistory.appendChild(messageDiv);
                    });
                }
            } catch (error) {
                console.error('加载历史记录失败:', error);
            }
        }
    </script>
</body>
</html>
