<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩管理 - 教务管理系统</title>
    <link rel="stylesheet" href="/unified_frontend/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <header class="page-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='/unified_frontend/'">← 返回</button>
                <h1>📊 成绩管理</h1>
            </div>
            <div class="header-right">
                <button class="btn btn-primary" onclick="alert('成绩录入功能开发中...')">录入成绩</button>
            </div>
        </header>

        <!-- 开发中提示 -->
        <div class="coming-soon">
            <div class="icon">🚧</div>
            <h2>功能开发中</h2>
            <p>成绩管理模块正在开发中，敬请期待！</p>
            
            <div class="features-grid">
                <div class="feature-card">
                    <span class="feature-icon">📝</span>
                    <h3>成绩录入</h3>
                    <p>批量或单条录入学生成绩</p>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">🔍</span>
                    <h3>成绩查询</h3>
                    <p>按学号、班级、科目查询成绩</p>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">📈</span>
                    <h3>统计分析</h3>
                    <p>平均分、最高分、及格率统计</p>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">📊</span>
                    <h3>数据可视化</h3>
                    <p>图表展示成绩分布</p>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">📉</span>
                    <h3>成绩排名</h3>
                    <p>班级排名、年级排名</p>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">📥</span>
                    <h3>数据导出</h3>
                    <p>Excel、PDF 导出功能</p>
                </div>
            </div>
            
            <div class="progress-section">
                <h3>开发进度</h3>
                <div class="progress-item">
                    <span class="progress-label">成绩录入</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 60%"></div>
                    </div>
                    <span class="progress-text">60%</span>
                </div>
                <div class="progress-item">
                    <span class="progress-label">成绩查询</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 40%"></div>
                    </div>
                    <span class="progress-text">40%</span>
                </div>
                <div class="progress-item">
                    <span class="progress-label">统计分析</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 20%"></div>
                    </div>
                    <span class="progress-text">20%</span>
                </div>
            </div>

            <button class="btn btn-primary" onclick="window.location.href='/unified_frontend/'">返回首页</button>
        </div>
    </div>
</body>
</html>
