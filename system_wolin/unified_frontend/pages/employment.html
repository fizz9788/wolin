<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就业管理 - 教务管理系统</title>
    <link rel="stylesheet" href="/unified_frontend/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <header class="page-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='/unified_frontend/'">← 返回</button>
                <h1>💼 就业管理</h1>
            </div>
            <div class="header-right">
                <button class="btn btn-primary" onclick="showAddEmploymentModal()">添加就业信息</button>
            </div>
        </header>

        <!-- 搜索和筛选 -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索学生姓名或班级..." onkeyup="searchEmployments()">
            <input type="number" id="minSalary" placeholder="最低薪资" onchange="filterBySalary()">
            <input type="number" id="maxSalary" placeholder="最高薪资" onchange="filterBySalary()">
            <button class="btn btn-secondary" onclick="filterBySalary()">筛选</button>
        </div>

        <!-- 统计信息 -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">就业人数</span>
                <span class="stat-value" id="employedCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">平均薪资</span>
                <span class="stat-value" id="avgSalary">¥0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">最高薪资</span>
                <span class="stat-value" id="maxSalaryStat">¥0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">最低薪资</span>
                <span class="stat-value" id="minSalaryStat">¥0</span>
            </div>
        </div>

        <!-- 就业信息表格 -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>班级</th>
                        <th>公司名称</th>
                        <th>薪资</th>
                        <th>就业开始时间</th>
                        <th>Offer下发时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="employmentTableBody">
                    <!-- 动态加载数据 -->
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div class="pagination">
            <button class="page-btn" onclick="prevPage()">上一页</button>
            <span id="pageInfo">第 1 页</span>
            <button class="page-btn" onclick="nextPage()">下一页</button>
        </div>

        <!-- 添加/编辑就业信息模态框 -->
        <div id="employmentModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">添加就业信息</h2>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <div class="modal-body">
                    <form id="employmentForm">
                        <div class="form-group">
                            <label for="studentId">学号：</label>
                            <input type="number" id="studentId" name="student_id" required>
                        </div>
                        <div class="form-group">
                            <label for="studentName">学生姓名：</label>
                            <input type="text" id="studentName" name="student_name" required>
                        </div>
                        <div class="form-group">
                            <label for="className">班级名称：</label>
                            <input type="text" id="className" name="class_name" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="empOpenTime">就业开始时间：</label>
                                <input type="date" id="empOpenTime" name="emp_open_time" required>
                            </div>
                            <div class="form-group">
                                <label for="offerDownTime">Offer下发时间：</label>
                                <input type="date" id="offerDownTime" name="offer_down_time" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="companyName">公司名称：</label>
                            <input type="text" id="companyName" name="company_name" required>
                        </div>
                        <div class="form-group">
                            <label for="salary">薪资：</label>
                            <input type="number" id="salary" name="salary" required>
                        </div>
                        <div class="button-group">
                            <button type="submit" class="btn btn-primary">保存</button>
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- 消息提示 -->
        <div id="messageToast" class="toast"></div>
    </div>

    <script src="/unified_frontend/static/js/employment.js"></script>
</body>
</html>
